{% extends "base.html" %}

{% block head %}
{{ super() }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
    .form-container {
        max-width: 600px;
        margin: 50px auto;
    }
    
    .form-card {
        background: white;
        border-radius: 30px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        border: 1px solid #e9ecef;
        overflow: hidden;
    }
    
    .form-header {
        background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
        color: white;
        padding: 30px;
        text-align: center;
    }
    
    .form-header i {
        font-size: 3rem;
        margin-bottom: 15px;
    }
    
    .form-body {
        padding: 30px;
    }
    
    .form-label {
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 8px;
    }
    
    .form-control, .form-select {
        border: 2px solid #e9ecef;
        border-radius: 12px;
        padding: 12px 15px;
        transition: all 0.2s ease;
    }
    
    .form-control:focus, .form-select:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1);
    }
    
    .btn-submit {
        background: linear-gradient(135deg, #0d6efd, #0a58ca);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 14px;
        font-weight: 600;
        width: 100%;
        transition: all 0.3s ease;
    }
    
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
    }
    
    .btn-submit i {
        margin-right: 8px;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <div class="form-card">
            <div class="form-header">
                <i class="bi bi-diagram-3"></i>
                <h2 class="fw-bold mb-0">Создание нового пути</h2>
            </div>
            
            <div class="form-body">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label">Название пути</label>
                        <input type="text" name="title" class="form-control" placeholder="Например: Python разработчик" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Описание</label>
                        <textarea name="description" class="form-control" rows="4" placeholder="Опишите, чему научится студент..." required></textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Уровень сложности</label>
                        <select name="difficulty" class="form-select">
                            <option value="beginner">🌱 Начинающий</option>
                            <option value="intermediate">📊 Средний</option>
                            <option value="advanced">🚀 Продвинутый</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn-submit">
                        <i class="bi bi-check-lg"></i>Создать путь
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
