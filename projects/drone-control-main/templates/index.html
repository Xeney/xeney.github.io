<!DOCTYPE html>
<html>
<head>
    <title>Drone Delivery Planner</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Планирование доставки дронами</h1>
        
        <div class="upload-section">
            <h3>1. Загрузите файлы:</h3>
            <p>Названия должны быть строго drone.csv и order.csv</p>
            <!-- В templates/index.html обновляю текст -->
            <div class="drop-zone" id="dropZone">
                Перетащите drone.csv и order.csv сюда
            </div>
            <input type="file" id="fileInput" multiple accept=".csv" style="display: none;">
        </div>

        <div class="actions">
            <button onclick="generatePlan()" id="generateBtn">2. Создать план</button>
            <button onclick="downloadResults()" id="downloadBtn">3. Визуализация</button>
        </div>

        <div id="status"></div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
